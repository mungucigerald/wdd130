<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="styles/quiz.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form</title>
</head>

<body>
    <main>
        <h1>✅ Basic Quiz </h1>
        <form class="box">
            <div class="quiz_item box">
                <label for="q1">What does the acronym CSS stand for?</label>
                <input type="text" id="q1" name="q1" required>
            </div>
            <div class="quiz_item box">
                <label for="q2">How are id and class attributes selected in CSS?</label>
                <textarea name="q2" id="q2"></textarea>
            </div>
            <div class="quiz_item box">
                <label for="q3">Which of the following is a valid CSS comment?</label>
                <select name="q3" id="q3">
                    <option value="" selected disabled>Click here</option>
                    <option value="a">&lt;!--This is a comment--&gt;</option>
                    <option value="b">/*This is a comment*/</option>
                    <option value="c"># This is comment</option>
                </select>
            </div>
            <div class="quiz_item box">
                <label for="q4">What is the bottom margin given this declaration?</label>
                <code class="box">margin: 10px 5px 15px</code>
                <input type="number" id="q4" name="q4">
            </div>
            <div>
                <button type="submit">Submit Quiz</button>
            </div>
        </form>
    </main>
</body>

</html>
