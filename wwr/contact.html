<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="styles/rafting.css">
    <link rel="icon" href="images/z-raftingcompas.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact Us at Nile Rafting Travels(+256-123-123-456) and book your reservation today">
    <meta name="author" content="Gerald Munguci">
    <title>Contact Us | Nile Rafting Travels</title>
</head>

<body>
    <header>
        <img class="logo" src="images/z-raftingcompas.jpg" alt="Rafting Compass">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="address">
            <h1>Nile Rafting Travels</h1>
            <p>256 Main Jinja Road <br>
                Busowoko Falls <br>
                Jinja, Uganda <br>
                +256-123-123-456</p>
            <h2>Contact Us today</h2>
        </div>
        <div class="grid">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d61981.43858506133!2d33.138697268704696!3d0.5178987172665951!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sug!4v1780559460359!5m2!1sen!2sug"
                  width="500" height="500" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="user-input">
                <form>
                    <div class="field">
                        <label for="name">Name:</label>
                        <input type="text" name="name" id="name" placeholder="John Doe">
                    </div>
                    <div class="field">
                        <label for="usermail">Email:</label>
                        <input type="text" name="usermail" id="usermail"
                          placeholder="johndoe@gmail.com">
                    </div>
                    <div class="field">
                        <legend>Message <br>
                            Purpose</legend>
                        <input type="radio" id="inquiry" name="radioitems">
                        <label for="inquiry">General Inquiry</label>
                        <input type="radio" id="reservation" name="radioitems">
                        <label for="reservation">Reservation Question</label>
                        <input type="radio" id="suggestion" name="radioitems">
                        <label for="suggestion">Website Suggestion</label>
                    </div>
                </form>
                <div class="field">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" placeholder="Type Here . . ."></textarea>
                </div>
                <div class="field">
                    <input type="checkbox" name="newsletter" id="newsletter">
                    <label for="newsletter">Please Subscribe to our monthly newsletter</label>
                </div>
                <div><button type="submit">Get in Touch!</button></div>
                </form>
            </div>
        </div>
        </div>
        <div class="profiles">
            <div id="profile-intro">
                <h2>Meet the Team</h2>
                <h2>We Are Here to Serve You </h2>
            </div>
            <div id="gallery">
                <figure>
                    <img src="images/lead-guide.jpg" alt="Lead guide: Marcus Kante" width="250">
                    <figcaption>Marcus Kante | Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/equip-specialist.jpg" alt="Equipment Specialist: David Afoyo"
                      width="250">
                    <figcaption>David Afoyo | Equipment Specialist</figcaption>
                </figure>
                <figure>
                    <img src="images/operations-manager.jpg" alt="Operations Manager: Amara Oronkwo"
                      width="250">
                    <figcaption>Amara Oronkwo | Operations Manager</figcaption>
                </figure>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 🔰 Nile Rafting Travels 🔰 Gerald Munguci</p>
        <nav class="socialmedia">
            <a href="https://www.x.com">
                <img src="images/x-bw.png" alt="X Logo" width="25">
            </a>
            <a href="https://www.tiktok.com">
                <img src="images/tictok-bw.png" alt="TikTok Logo" width="25">
            </a>
            <a href="https://www.youtube.com">
                <img src="images/youtube.png" alt="YouTube Logo" width="25">
            </a>
        </nav>
    </footer>
</body>

</html>
